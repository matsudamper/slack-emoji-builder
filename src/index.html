<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Emoji Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DotGothic16&family=M+PLUS+1p:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-section">
      <h1>Slack Emoji Builder</h1>

      <div class="field">
        <label for="text-input">Text</label>
        <input type="text" id="text-input" placeholder="e.g. 🎉 done!" maxlength="20" />
      </div>

      <div class="field">
        <label for="font-family">Font</label>
        <select id="font-family">
          <option value="&quot;Noto Sans JP&quot;, &quot;Hiragino Sans&quot;, &quot;Yu Gothic&quot;, Meiryo, sans-serif" selected>Noto Sans JP / ゴシック</option>
          <option value="&quot;Noto Serif JP&quot;, &quot;Yu Mincho&quot;, &quot;Hiragino Mincho ProN&quot;, serif">Noto Serif JP / 明朝</option>
          <option value="&quot;M PLUS 1p&quot;, &quot;Noto Sans JP&quot;, sans-serif">M PLUS 1p / 角丸ゴシック</option>
          <option value="&quot;M PLUS Rounded 1c&quot;, &quot;Noto Sans JP&quot;, sans-serif">M PLUS Rounded 1c / 丸ゴシック</option>
          <option value="&quot;Zen Maru Gothic&quot;, &quot;Noto Sans JP&quot;, sans-serif">Zen Maru Gothic / やわらか丸ゴシック</option>
          <option value="&quot;Dela Gothic One&quot;, &quot;Noto Sans JP&quot;, sans-serif">Dela Gothic One / 太字見出し</option>
          <option value="&quot;DotGothic16&quot;, &quot;Noto Sans JP&quot;, monospace">DotGothic16 / ドット</option>
          <option value="system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, &quot;Hiragino Sans&quot;, &quot;Yu Gothic&quot;, Meiryo, sans-serif">システム日本語ゴシック</option>
        </select>
      </div>

      <div class="field">
        <label for="font-size">Font size</label>
        <div class="font-size-row font-size-control-row">
          <input type="range" id="font-size" />
          <span id="font-size-value" class="font-size-value"></span>
          <label class="auto-label">
            <input type="checkbox" id="font-size-auto" checked />
            Auto
          </label>
        </div>
      </div>

      <div class="field">
        <label>Text direction</label>
        <div class="direction-toggle" id="direction-toggle">
          <span class="direction-indicator" id="direction-indicator"></span>
          <button type="button" class="direction-btn active" data-direction="horizontal">横</button>
          <button type="button" class="direction-btn" data-direction="vertical">縦</button>
          <button type="button" class="direction-btn" data-direction="circle">円</button>
        </div>
      </div>

      <div class="field" id="circle-diameter-field" hidden>
        <label for="circle-diameter">円の直径</label>
        <div class="font-size-row">
          <input type="range" id="circle-diameter" />
          <span id="circle-diameter-value" class="font-size-value"></span>
        </div>
      </div>

      <div class="field" id="line-break-field">
        <label class="auto-label">
          <input type="checkbox" id="line-break" checked />
          Auto line break
        </label>
      </div>

      <div class="color-row">
        <div class="field">
          <label>Text color</label>
          <div class="color-input-wrap">
            <input type="color" id="text-color" value="#ffffff" />
            <input type="text" class="color-hex" id="text-color-hex" value="#ffffff" maxlength="7" spellcheck="false" />
          </div>
        </div>
        <div class="field">
          <label>Background</label>
          <div class="color-input-wrap" id="bg-color-wrap">
            <input type="color" id="bg-color" value="#4a9cf6" />
            <input type="text" class="color-hex" id="bg-color-hex" value="#4a9cf6" maxlength="7" spellcheck="false" />
          </div>
          <label class="auto-label">
            <input type="checkbox" id="bg-transparent" checked />
            Transparent
          </label>
        </div>
      </div>

      <div class="field">
        <label for="border-size">Border size</label>
        <div class="font-size-row">
          <input type="range" id="border-size" />
          <span id="border-size-value" class="font-size-value"></span>
        </div>
      </div>

      <div class="color-row">
        <div class="field">
          <label>Border color</label>
          <div class="color-input-wrap">
            <input type="color" id="border-color" value="#000000" />
            <input type="text" class="color-hex" id="border-color-hex" value="#000000" maxlength="7" spellcheck="false" />
          </div>
        </div>
        <div class="field"></div>
      </div>

      <div class="field">
        <label for="depth-size">厚み</label>
        <div class="font-size-row">
          <input type="range" id="depth-size" />
          <span id="depth-size-value" class="font-size-value"></span>
        </div>
      </div>

      <div class="field animation-field">
        <div class="animation-header">
          <button type="button" class="animation-toggle" id="animation-toggle" aria-expanded="true" aria-controls="animation-body">
            <span class="animation-chevron" id="animation-chevron" aria-hidden="true"></span>
            <span class="animation-title">ANIMATION</span>
            <span class="animation-count" id="animation-count">0</span>
          </button>
          <button type="button" class="animation-clear-btn" id="animation-clear-btn">全てクリア</button>
        </div>
        <div class="animation-body" id="animation-body">
          <div class="anim-container" id="anim-container"></div>
        </div>
      </div>
    </div>

    <div class="preview-section" id="preview-section">
      <span class="preview-label">Preview</span>
      <div class="preview-panels">
        <div class="preview-panel">
          <span class="preview-theme-label">ダーク</span>
          <div class="canvas-wrap canvas-wrap--dark" id="canvas-wrap-dark"></div>
        </div>
        <div class="preview-panel">
          <span class="preview-theme-label">ライト</span>
          <div class="canvas-wrap canvas-wrap--light" id="canvas-wrap-light"></div>
        </div>
      </div>
      <div class="field preview-frame-slider" id="preview-frame-slider" hidden>
        <div class="frame-slider-header">
          <label for="frame-slider">フレーム</label>
          <label class="auto-label">
            <input type="checkbox" id="frame-autoplay" checked />
            自動再生
          </label>
        </div>
        <div class="font-size-row">
          <input type="range" id="frame-slider" min="0" max="0" value="0" step="1" />
          <span id="frame-slider-value" class="font-size-value">0</span>
        </div>
      </div>
      <div class="preview-actions">
        <button type="button" id="generate-btn">Generate Image</button>
        <a id="download-link" download="emoji.png">
          <button class="download-btn" id="download-btn" disabled>Download PNG</button>
        </a>
      </div>
    </div>
  </div>

  <script src="gif-encoder.js"></script>
  <script src="text-layout.js"></script>
  <script src="emoji-renderer.js"></script>
  <script src="animation.js"></script>
  <script src="preview.js"></script>
  <script src="script.js"></script>
</body>
</html>
