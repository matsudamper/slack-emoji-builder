name: JavaScript Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: find src -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
